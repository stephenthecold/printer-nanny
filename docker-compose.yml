# On-prem central stack: Postgres + API + worker + dashboard behind Caddy.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nanny
      POSTGRES_PASSWORD: nanny
      POSTGRES_DB: printer_nanny
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanny -d printer_nanny"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://nanny:nanny@db:5432/printer_nanny
      SECRET_KEY: ${SECRET_KEY:-change-me-in-prod}
      FREESCOUT_BASE_URL: ${FREESCOUT_BASE_URL:-}
      FREESCOUT_API_KEY: ${FREESCOUT_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
    # Exposed on the host so an external reverse proxy (your own Caddy / Nginx /
    # Traefik) can point at it. The bundled `caddy` service below is opt-in.
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    # Apply migrations, bootstrap admin user on first run (idempotent), then serve.
    command: >
      sh -c "alembic upgrade head &&
             python -m central.seed --init &&
             uvicorn central.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://nanny:nanny@db:5432/printer_nanny
      SECRET_KEY: ${SECRET_KEY:-change-me-in-prod}
      FREESCOUT_BASE_URL: ${FREESCOUT_BASE_URL:-}
      FREESCOUT_API_KEY: ${FREESCOUT_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "central.worker.run", "--interval", "60"]

  # Local SMTP catcher so email alerts are visible in dev (http://localhost:8025).
  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"

  # Optional bundled reverse proxy. Opt-in (`docker compose --profile caddy up -d`).
  # Skip this if you already run Caddy / Nginx / Traefik on the host — just point
  # your existing proxy at http://<docker-host>:${API_PORT:-8000}. The bundled
  # Caddyfile is a dev-friendly :80 → api:8000 with no TLS; set a hostname in it
  # to have Caddy provision certs automatically.
  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    ports:
      - "${CADDY_PORT:-8080}:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

  # Optional built-in site agent (opt-in: `docker compose --profile agent up -d`).
  # LINUX ONLY for real SNMP — network_mode: host lets it reach LAN printers. On
  # Docker Desktop (macOS/Windows) containers run in a VM and can't see your LAN;
  # there, run the agent on the host instead (scripts/install-local-agent-macos.sh
  # or deploy/printer-nanny-agent.service). Enroll first to get the id/key:
  #   docker compose exec api python -m central.enroll --subnet <cidr> --json
  #   PN_AGENT_ID=.. PN_API_KEY=.. docker compose --profile agent up -d agent
  agent:
    build:
      context: .
      dockerfile: deploy/agent.Dockerfile
    profiles: ["agent"]
    network_mode: host
    environment:
      # Empty defaults so the normal `docker compose up` (without --profile agent)
      # never errors; the agent fails loudly at runtime if these aren't set.
      PN_CENTRAL_URL: ${PN_CENTRAL_URL:-http://localhost:8080}
      PN_AGENT_ID: ${PN_AGENT_ID:-}
      PN_API_KEY: ${PN_API_KEY:-}
    restart: always

volumes:
  pgdata:
