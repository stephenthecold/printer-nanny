# Printer Nanny site agent config. Copy to /etc/printer-nanny/agent.toml
# (or point $PRINTER_NANNY_CONFIG at it).
#
# In normal operation this file only needs the three identity values below —
# subnets, SNMP community, and poll/heartbeat intervals are configured per-site
# in the central UI (Agents + Settings) and fetched on each cycle. The [snmp]
# and [[subnets]] blocks are OPTIONAL local fallbacks used only if central is
# unreachable on startup.

# Central server base URL (no trailing path).
central_url = "https://printers.msp.example.com"

# Identity issued by the central UI (Agents → enroll). The key is shown once.
agent_id = 1
api_key  = "pn_xxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Set false only for self-signed central certs inside a trusted tunnel.
verify_tls = true

# --- Optional local fallbacks (central overrides these when reachable) --------
# [snmp]
# version   = "2c"
# community = "public"
# timeout   = 2.0
# retries   = 1
#
# [[subnets]]
# cidr = "10.10.0.0/24"
